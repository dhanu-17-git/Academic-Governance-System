<!-- ── ARIA Chatbot Widget ─────────────────────────────────── -->
<div id="aria-chatbot" class="fixed bottom-6 right-6 sm:bottom-8 sm:right-8 z-[9999] font-sans perspective-[1000px]">

  <!-- Floating Toggle Button -->
  <button id="chat-toggle-btn" title="Chat with ARIA"
    class="w-16 h-16 rounded-full bg-gradient-to-r from-indigo-600 via-purple-600 to-pink-500 border-2 border-white/40 shadow-[0_0_30px_rgba(99,102,241,0.6)] flex items-center justify-center text-3xl transition-all duration-500 hover:scale-110 hover:shadow-[0_0_50px_rgba(99,102,241,0.9)] relative group outline-none overflow-visible z-50">
    <!-- Pulsing halos (Managed by JS for first time only) -->
    <div id="aria-halo-1" class="absolute inset-0 rounded-full border-2 border-indigo-400 animate-[ping_2s_cubic-bezier(0,0,0.2,1)_infinite] opacity-75 hidden"></div>
    <div id="aria-halo-2" class="absolute inset-[-8px] rounded-full border-2 border-purple-400 animate-[ping_3s_cubic-bezier(0,0,0.2,1)_infinite] opacity-50 hidden" style="animation-delay: 1s;"></div>
    
    <div class="absolute inset-0 bg-white/20 group-hover:bg-transparent transition-colors rounded-full duration-500 z-0"></div>
    <span id="chat-icon" class="relative z-10 drop-shadow-lg transition-transform duration-500 group-hover:rotate-12 group-hover:scale-110 flex items-center justify-center">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" class="text-white drop-shadow-md">
        <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 13.5997 2.37562 15.1116 3.04346 16.4525C3.22094 16.8088 3.28001 17.2161 3.17712 17.6006L2.58151 19.8267C2.32295 20.793 3.20701 21.677 4.17335 21.4185L6.39939 20.8229C6.78393 20.72 7.19121 20.7791 7.54753 20.9565C8.88837 21.6244 10.4003 22 12 22Z" fill="currentColor"/>
        <path d="M8 12H8.01M12 12H12.01M16 12H16.01" stroke="#4F46E5" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </span>
    <span id="chat-close-icon"
      class="relative z-10 text-white font-black text-2xl hidden drop-shadow-sm transition-transform duration-500 hover:rotate-90">✕</span>
    <span
      class="chat-badge absolute -top-2 -right-2 bg-rose-500 border-2 border-white text-white rounded-full w-6 h-6 text-[11px] font-bold flex items-center justify-center shadow-lg tracking-tighter animate-bounce"
      id="chat-badge" style="display:none;">1</span>
  </button>

  <!-- Chat Window -->
  <div id="chat-window"
    class="absolute bottom-24 right-0 w-[calc(100vw-2rem)] sm:w-[420px] h-[75vh] sm:h-[620px] max-h-[800px] bg-white/80 backdrop-blur-3xl rounded-[2rem] shadow-[0_30px_100px_-15px_rgba(79,70,229,0.4)] border border-white flex flex-col overflow-hidden origin-bottom-right transition-all duration-500 pointer-events-none"
    style="transform: scale(0.8) translateY(20px) rotateX(10deg); opacity: 0; visibility: hidden;">

    <!-- Header -->
    <div id="chat-header"
      class="bg-gradient-to-br from-indigo-600 via-purple-600 to-indigo-800 p-5 flex items-center justify-between text-white shrink-0 shadow-[0_10px_30px_-10px_rgba(0,0,0,0.3)] relative z-20 overflow-hidden rounded-t-[2rem]">
      <!-- Animated background shapes -->
      <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-2xl -translate-y-10 translate-x-10 animate-pulse"></div>
      <div class="absolute bottom-0 left-0 w-24 h-24 bg-pink-500/30 rounded-full blur-xl translate-y-10 -translate-x-10 animate-[pulse_4s_ease-in-out_infinite]"></div>

      <div class="flex items-center gap-4 relative z-10">
        <div class="relative group cursor-pointer">
          <div class="absolute -inset-1 bg-gradient-to-r from-pink-500 to-indigo-400 rounded-full blur opacity-75 group-hover:opacity-100 transition duration-500 animate-pulse"></div>
          <div class="w-12 h-12 bg-white/10 backdrop-blur-md border border-white/40 rounded-full flex items-center justify-center object-cover text-2xl shadow-inner relative z-10 overflow-hidden">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=ARIA&backgroundColor=transparent" alt="ARIA" class="w-10 h-10 transform group-hover:scale-110 transition-transform duration-300">
          </div>
          <div class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-emerald-400 border-2 border-indigo-800 rounded-full z-20 shadow-[0_0_10px_rgba(52,211,153,0.8)]"></div>
        </div>
        <div>
          <div class="font-extrabold text-lg tracking-wider drop-shadow-md flex items-center gap-2">ARIA <span class="flex h-2 w-2 relative hidden sm:flex"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span></div>
          <div class="text-[10px] font-bold text-indigo-50 opacity-100 drop-shadow-sm tracking-widest uppercase bg-black/20 px-2 py-0.5 rounded-full backdrop-blur-sm inline-block mt-0.5 border border-white/20">
            Advanced Intelligence</div>
        </div>
      </div>
      <button id="chat-minimize" title="Minimize"
        class="w-9 h-9 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center transition-all duration-300 hover:scale-110 hover:rotate-90 border border-white/20 backdrop-blur-sm relative z-10">
        <span class="material-symbols-outlined text-[20px]">close</span>
      </button>
    </div>

    <!-- Messages Area -->
    <div id="chat-messages"
      class="flex-1 overflow-y-auto p-5 sm:p-6 flex flex-col gap-5 bg-gradient-to-b from-slate-50/50 to-slate-100/50 scroll-smooth custom-scrollbar relative z-0">
      <!-- Welcome message injected by JS -->
    </div>

    <!-- Quick Suggestion Chips -->
    <div id="chat-suggestions"
      class="px-5 py-3.5 flex flex-nowrap gap-2 shrink-0 overflow-x-auto bg-white/80 backdrop-blur-md border-t border-slate-200/50 scrollbar-hide shadow-[0_-5px_15px_-5px_rgba(0,0,0,0.02)] relative z-10">
      <!-- Injected by JS after load -->
    </div>

    <!-- Input Area -->
    <div id="chat-input-area"
      class="flex items-center px-4 py-4 sm:px-5 sm:py-5 bg-white backdrop-blur-2xl border-t border-slate-100 gap-3 shrink-0 relative z-20 shadow-[0_-10px_40px_-10px_rgba(0,0,0,0.06)] rounded-b-[2rem]">
      <input type="text" id="chat-input" placeholder="Ask ARIA anything..." maxlength="500" autocomplete="off"
        class="flex-1 border-2 border-slate-100 bg-slate-50 rounded-full px-5 py-3.5 text-sm font-semibold outline-none transition-all duration-300 focus:border-indigo-400 focus:bg-white focus:shadow-[0_0_20px_rgba(99,102,241,0.15)] placeholder:text-slate-400 text-slate-700" />
      <button id="chat-send-btn" title="Send"
        class="w-[48px] h-[48px] rounded-full bg-gradient-to-br from-indigo-600 to-purple-600 text-white flex items-center justify-center shrink-0 transition-all duration-300 hover:scale-110 active:scale-95 disabled:opacity-50 disabled:grayscale shadow-[0_10px_20px_-10px_rgba(79,70,229,0.8)] hover:shadow-[0_10px_25px_-5px_rgba(79,70,229,0.9)] relative group overflow-hidden">
        <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out"></div>
        <span class="material-symbols-outlined text-[20px] relative z-10 translate-x-0.5 group-hover:translate-x-1 transition-transform">send</span>
      </button>
    </div>

  </div>
</div>
<!-- ── End ARIA Chatbot Widget ─────────────────────────────── -->

<!-- ── Custom Styles for scrollbar & typing anim ── -->
<style>
  /* Base open animation for dialogs (reusing if needed) */
  .custom-scrollbar::-webkit-scrollbar {
    width: 6px;
  }

  .custom-scrollbar::-webkit-scrollbar-track {
    background: transparent;
  }

  .custom-scrollbar::-webkit-scrollbar-thumb {
    background: rgba(148, 163, 184, 0.4);
    border-radius: 10px;
  }

  .custom-scrollbar::-webkit-scrollbar-thumb:hover {
    background: rgba(99, 102, 241, 0.6);
  }

  .scrollbar-hide::-webkit-scrollbar {
    display: none;
  }

  .scrollbar-hide {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  /* Chat Window Spring Animation */
  .chat-window-open {
    transform: scale(1) translateY(0) rotateX(0deg) !important;
    opacity: 1 !important;
    visibility: visible !important;
    pointer-events: auto !important;
    transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Message Pop Animation */
  @keyframes msg-pop {
    0% { opacity: 0; transform: translateY(20px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  .animate-msg {
    animation: msg-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  @keyframes typingBounce {
    0%, 60%, 100% {
      transform: translateY(0);
      opacity: 0.3;
      background-color: #94A3B8;
    }
    30% {
      transform: translateY(-5px);
      opacity: 1;
      background-color: #4F46E5;
    }
  }

  .typing-dot {
    animation: typingBounce 1.4s infinite cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .typing-dot:nth-child(2) {
    animation-delay: 0.2s;
  }

  .typing-dot:nth-child(3) {
    animation-delay: 0.4s;
  }

  /* Markdown styling inside messages */
  .chat-msg strong {
    font-weight: 800;
    color: inherit;
  }

  .chat-msg.user strong {
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }

  .chat-msg.bot strong {
    color: #312e81; /* Indigo-900 */
  }
</style>
