<meta name="csrf-token" content="{{ csrf_token() }}">
<!-- ── ARIA Chatbot Widget (Aesthetic Minimal) ──────────────── -->
<div id="aria-chatbot" class="fixed bottom-6 right-6 sm:bottom-8 sm:right-8 z-[9999] font-sans">

  <!-- Minimal Toggle Button -->
  <button id="chat-toggle-btn" title="Chat with ARIA"
    class="w-14 h-14 rounded-full bg-indigo-600 border border-indigo-500 shadow-lg shadow-indigo-200 flex items-center justify-center text-3xl transition-transform duration-300 hover:scale-105 active:scale-95 relative outline-none z-50">
    <span id="chat-icon" class="relative z-10 flex items-center justify-center transition-transform duration-300 group-hover:scale-110">
      <span class="material-symbols-outlined text-white text-[28px]">auto_awesome</span>
    </span>
    <span id="chat-close-icon" class="relative z-10 text-white font-medium text-xl hidden transition-transform duration-300 hover:rotate-90">✕</span>
    <span id="chat-badge" class="absolute -top-1 -right-1 bg-rose-500 border-2 border-white text-white rounded-full w-5 h-5 text-[10px] font-bold flex items-center justify-center shadow-sm" style="display:none;">1</span>
  </button>

  <!-- Clean Chat Window -->
  <div id="chat-window"
    class="absolute bottom-20 right-0 w-[calc(100vw-2rem)] sm:w-[400px] h-[75vh] sm:h-[600px] max-h-[800px] bg-white rounded-2xl shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] border border-slate-200 flex flex-col overflow-hidden origin-bottom-right transition-all duration-400 ease-out pointer-events-none"
    style="transform: scale(0.95) translateY(10px); opacity: 0; visibility: hidden;">

    <!-- Header -->
    <div id="chat-header"
      class="bg-white px-5 py-4 flex items-center justify-between border-b border-slate-100 shrink-0 z-20">
      
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-indigo-50 border border-indigo-100 text-indigo-600 rounded-full flex items-center justify-center overflow-hidden">
          <span class="material-symbols-outlined text-[22px]">auto_awesome</span>
        </div>
        <div>
          <div class="font-bold text-slate-900 text-[15px] flex items-center gap-2">ARIA
            <span class="flex h-1.5 w-1.5 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-emerald-500"></span></span>
          </div>
          <div class="text-[11px] font-medium text-slate-500 mt-0.5">AI Assistant</div>
        </div>
      </div>
      <button id="chat-minimize" title="Minimize"
        class="w-8 h-8 rounded-full hover:bg-slate-100 text-slate-400 flex items-center justify-center transition-colors">
        <span class="material-symbols-outlined text-[18px]">expand_more</span>
      </button>
    </div>

    <!-- Messages Area -->
    <div id="chat-messages"
      class="flex-1 overflow-y-auto px-5 py-6 flex flex-col gap-4 bg-[#FAFAFA] scroll-smooth custom-scrollbar relative z-0">
    </div>

    <!-- Quick Suggestion Chips -->
    <div id="chat-suggestions"
      class="px-5 py-3 flex flex-nowrap gap-2 shrink-0 overflow-x-auto bg-white border-t border-slate-100 scrollbar-hide empty:hidden">
    </div>

    <!-- Input Area -->
    <div id="chat-input-area"
      class="flex items-center px-4 py-4 bg-white border-t border-slate-100 gap-3 shrink-0 relative z-20">
      <input type="text" id="chat-input" placeholder="Message ARIA..." maxlength="500" autocomplete="off"
        class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-800 outline-none transition-colors focus:border-slate-300 focus:bg-white placeholder:text-slate-400" />
      
      <button id="chat-send-btn" title="Send"
        class="w-11 h-11 rounded-xl bg-indigo-600 text-white flex items-center justify-center shrink-0 transition-transform hover:scale-105 active:scale-95 disabled:opacity-50 shadow-sm shadow-indigo-200">
        <span class="material-symbols-outlined text-[18px]">arrow_upward</span>
      </button>
    </div>

  </div>
</div>

<style>
  .custom-scrollbar::-webkit-scrollbar { width: 4px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  .scrollbar-hide::-webkit-scrollbar { display: none; }
  .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

  .chat-window-open {
    transform: scale(1) translateY(0) !important;
    opacity: 1 !important;
    visibility: visible !important;
    pointer-events: auto !important;
  }

  /* Fade & Slide up for messages */
  @keyframes msg-fade-in {
    0% { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .animate-msg { animation: msg-fade-in 0.3s ease-out forwards; }

  /* Minimal Typing */
  @keyframes dot-fade {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
  .typing-dot { animation: dot-fade 1.4s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  /* Markdown */
  .chat-msg strong { font-weight: 600; color: #0f172a; }
  .chat-msg.user strong { color: #ffffff; }
  .chat-msg.bot strong { color: #0f172a; }
</style>

<script src="{{ url_for('static', filename='js/chatbot.js') }}"></script>
