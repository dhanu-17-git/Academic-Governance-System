# --------------------------------------------------------------------------- #
#  CI - Academic Governance System
# --------------------------------------------------------------------------- #
#  Runs on push / PR to main.
#  Steps: install → lint → test → security scan
#
#  CI-UNSAFE tests (excluded):
#    - tests/test_gemini_models.py  → live Gemini API call
#    - tests/test_openai.py         → live OpenAI API call
# --------------------------------------------------------------------------- #

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Ruff
        run: uv run ruff check .

      - name: Bandit
        run: uv run bandit -r academic_governance/ --skip B101 -q

  test:
    name: Tests (CI-safe)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: academic_governance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/academic_governance_test
      SECRET_KEY: ci-test-secret-key
      FLASK_ENV: testing

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Run CI-safe tests
        run: |
          uv run pytest tests/ \
            --ignore=tests/test_openai.py \
            --ignore=tests/test_gemini_models.py \
            --ignore=tests/test_quick.py \
            -v --tb=short

      - name: Verify migrations
        run: |
          uv run flask db upgrade
          uv run flask db check
        env:
          FLASK_APP: wsgi:app

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: pip-audit
        run: uv run pip-audit

      - name: Bandit
        run: uv run bandit -r academic_governance/ --skip B101 -q